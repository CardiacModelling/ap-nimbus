<form [formGroup]="inputForm" 
      class="form-horizontal"
      (ngSubmit)="onSubmit()">
  <div class="form-group">
    <div class="row">
      <div class="col-sm-8 input-division rounded-5">Cell Model ( Please contact us via the <a (click)=goToContactPage() title="Go To Contact">Contact</a> page if you would like a different model )</div>
      <div class="col-sm-4"></div>
    </div>
    <app-models [inputForm]="inputForm"></app-models>
    <div class="row">
      <div class="col-sm-8 input-division rounded-5">Pacing Details</div>
      <div class="col-sm-4"></div>
    </div>
    <app-pacing [inputForm]="inputForm"
                [processedInputData]="processedInputData"></app-pacing>
    <div class="row">
      <div class="col-sm-8 input-division rounded-5">Compound concentrations</div>
      <div class="col-sm-4"></div>
    </div>
    <app-compound-concentrations [inputForm]="inputForm"
                                 [processedInputData]="processedInputData"></app-compound-concentrations>
    <div class="row">
      <div class="col-sm-3">
      </div>
      <div class="col-sm-9">
        <button [disabled]='inputForm.invalid' class="btn btn-success"
                                               type="submit">Run Simulation</button>
      </div>
    </div>
  </div>
</form>
